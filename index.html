<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>Course Finder — Find Courses You Qualify For</title>
    <meta name="description" content="Find the South African university and college courses you qualify for. Enter your Grade 11 or 12 marks and instantly see matching courses, APS scores, and admission requirements." />
    <meta name="theme-color" content="#7e14ff" />
    <link rel="canonical" href="https://mycoursefinder.web.app/" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph (default — overridden per-page by react-helmet-async) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Course Finder" />
    <meta property="og:title" content="Course Finder — Find Courses You Qualify For" />
    <meta property="og:description" content="Find the South African university and college courses you qualify for based on your marks." />
    <meta property="og:url" content="https://mycoursefinder.web.app/" />
    <meta property="og:image" content="https://mycoursefinder.web.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_ZA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Course Finder — Find Courses You Qualify For" />
    <meta name="twitter:description" content="Find the South African university and college courses you qualify for based on your marks." />
    <meta name="twitter:image" content="https://mycoursefinder.web.app/og-image.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Course Finder",
        "url": "https://mycoursefinder.web.app/",
        "description": "Find the South African university and college courses you qualify for based on your Grade 11 or 12 marks.",
        "applicationCategory": "EducationApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "ZAR"
        },
        "areaServed": {
          "@type": "Country",
          "name": "South Africa"
        }
      }
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2089738418774396"
     crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
